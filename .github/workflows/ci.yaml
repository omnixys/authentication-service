# Omnixys Workflow Suite – ci.yml
# Purpose: Continuous Integration pipeline for all pushes and pull requests.
# Language: Node / TypeScript (pnpm)

name: Continuous Integration – Omnixys

on:
  push:
    branches:
      - main
      - '!release'
  pull_request:
    branches:
      - '**'
      - '!release'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  KEYS_PATH: ${{ secrets.KEYS_PATH }}
  SERVICE: ${{ vars.SERVICE }}
  PORT: ${{ secrets.PORT }}
  NODE_ENV: ${{ secrets.NODE_ENV }}

jobs:
  ci:
    name: Run Lint, Build, Test, and Typecheck
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, 'chore(version)') &&
      !contains(github.event.head_commit.message, 'docs(changelog)')

    strategy:
      matrix:
        node-version: [24.10.0]

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Enable Corepack (pnpm)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: ⚙️ Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: ♻️ Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Setup npm registry auth
        run: |
          echo "@omnixys:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${OMNIXYS_TOKEN}" >> .npmrc
        env:
          OMNIXYS_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          OMNIXYS_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}

      - name: 🔍 Lint check
        run: pnpm lint

      - name: 🧱 Build project
        run: pnpm build

      - name: 🔤 Typecheck
        run: npx tsc
